<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Check AI – Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #212121;
      --bg-header: #171717;
      --bg-user: #2f2f2f;
      --bg-ai: #212121;
      --border: #424242;
      --text: #ececec;
      --accent: #10a37f;
      --rad: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      height: 60px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-weight: 600;
      font-size: 1.1rem;
      color: #fff;
      z-index: 10;
    }

    header span {
      color: var(--accent);
      margin-left: 6px;
    }

    /* Main Timeline */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      padding: 24px;
      gap: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .message.user {
      background: var(--bg-user);
    }

    .message.ai {
      background: var(--bg-ai);
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .user .avatar {
      background: #555;
    }

    .ai .avatar {
      background: var(--accent);
      color: white;
    }

    .content {
      flex: 1;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .loading-pulse {
      animation: pulse 1.5s infinite;
      color: #888;
    }

    @keyframes pulse {
      0% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.5;
      }
    }

    /* Attachments in Chat */
    .chat-attachment {
      max-width: 300px;
      max-height: 300px;
      border-radius: 8px;
      margin-top: 10px;
      display: block;
      border: 1px solid var(--border);
    }

    /* Analysis Card (Canvas + Error List) */
    .analysis-card {
      background: #2f2f2f;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 14px;
      overflow: hidden;
      max-width: 600px;
    }

    .analysis-card canvas {
      width: 100%;
      display: block;
      background: #000;
      border-bottom: 1px solid var(--border);
    }

    .error-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .error-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #3c3c3c;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .error-item .reason {
      flex: 1;
      margin: 0 10px;
    }

    .error-tag {
      padding: 3px 8px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
    }

    .tag-minor {
      background: #f1c40f22;
      color: #f1c40f;
    }

    .tag-major {
      background: #e67e2222;
      color: #e67e22;
    }

    .tag-critical {
      background: #e74c3c22;
      color: #e74c3c;
    }

    .zoom-btn {
      background: var(--border);
      border: none;
      color: #ccc;
      cursor: pointer;
      padding: 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      transition: background .2s;
    }

    .zoom-btn:hover {
      background: #555;
      color: #fff;
    }

    /* Checkbox trong error-item */
    .error-check {
      accent-color: #10a37f;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Fix Selected button */
    .fix-selected-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 12px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #10a37f, #0e8c6c);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .fix-selected-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .fix-selected-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Modal Regen */
    #regen-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #regen-modal-overlay.active { display: flex; }

    #regen-modal {
      background: rgba(40, 40, 45, 0.95);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #regen-modal h3 {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
    }

    #regen-mask-preview {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid rgba(255,60,60,0.4);
      background: #111;
      display: none;
    }

    #regen-prompt-input {
      width: 100%;
      background: #2a2a2a;
      border: 1px solid #555;
      border-radius: 8px;
      color: #eee;
      font-size: 0.88rem;
      font-family: inherit;
      padding: 10px 12px;
      resize: vertical;
      min-height: 90px;
      line-height: 1.5;
      outline: none;
    }
    #regen-prompt-input:focus { border-color: #10a37f; }

    .regen-modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-cancel-regen {
      background: #3c3c3c;
      border: none;
      color: #aaa;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .btn-cancel-regen:hover { background: #4a4a4a; color: #fff; }

    .btn-start-regen {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      border: none;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.2s;
    }
    .btn-start-regen:hover { opacity: 0.88; }
    .btn-start-regen:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Loading spinner trong modal */
    .regen-loading {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: #aaa;
    }
    .regen-loading.active { display: flex; }
    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #444;
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Regen result image trong chat */
    .regen-result-img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
      display: block;
      border: 2px solid #a855f7;
    }
    .download-regen-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 8px 14px;
      background: #3c3c3c;
      border: 1px solid #555;
      color: #ddd;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .download-regen-btn:hover { background: #555; color: #fff; }

    /* Input Area */
    #input-zone {
      padding: 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      width: 100%;
      max-width: 800px;
      background: #303030;
      border: 1px solid #4a4a4a;
      border-radius: 16px;
      padding: 8px 12px;
      position: relative;
    }

    .input-wrapper:focus-within {
      border-color: #666;
    }

    .attach-btn {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 20px;
      padding: 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .attach-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      padding: 10px;
      resize: none;
      min-height: 44px;
      max-height: 200px;
      outline: none;
      line-height: 1.5;
    }

    .send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 600;
      font-size: 0.9rem;
      align-self: flex-end;
      margin-bottom: 2px;
    }

    .send-btn:hover {
      background: #0e8c6c;
    }

    /* File Preview in Input */
    #file-preview-wrap {
      position: absolute;
      bottom: 100%;
      left: 0;
      margin-bottom: 10px;
      background: #303030;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: none;
      align-items: center;
      gap: 10px;
    }

    #file-preview-wrap img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
    }

    .remove-file {
      background: rgba(255, 0, 0, 0.5);
      border: none;
      color: #fff;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 10px;
    }
  </style>
</head>

<body>

  <header>
    <div>Design Check <span>AI</span></div>
  </header>

  <!-- Modal Fix & Regen -->
  <div id="regen-modal-overlay">
    <div id="regen-modal">
      <h3>🪄 Fix & Regen bằng Wan 2.6</h3>
      <img id="regen-mask-preview" src="" alt="Mask preview" />
      <div>
        <label style="font-size:0.82rem;color:#aaa;margin-bottom:6px;display:block;">Prompt sửa lỗi (có thể chỉnh):</label>
        <textarea id="regen-prompt-input" placeholder="Mô tả các lỗi cần sửa..."></textarea>
      </div>
      <div class="regen-loading" id="regen-loading">
        <div class="spinner"></div>
        <span>Wan 2.6 đang gen lại ảnh... (có thể mất 30–90 giây)</span>
      </div>
      <div class="regen-modal-actions">
        <button class="btn-cancel-regen" id="btn-cancel-regen" onclick="closeRegenModal()">Hủy</button>
        <button class="btn-start-regen" id="btn-start-regen" onclick="startRegen()">
          <span>🚀</span> Bắt đầu Gen lại
        </button>
      </div>
    </div>
  </div>

  <div id="chat-container">
    <div class="message ai">
      <div class="avatar">🔍</div>
      <div class="content">
        Xin chào! Tôi là Trợ lý phân tích Thiết kế AI. Bạn có thể up một bức poster, logo hoặc gõ câu hỏi vào bên dưới
        nhé!
      </div>
    </div>
  </div>

  <div id="input-zone">
    <div class="input-wrapper">

      <div id="file-preview-wrap">
        <img id="file-preview" src="" />
        <button class="remove-file" onclick="clearFile()">×</button>
      </div>

      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="previewFile(event)" />
      <button class="attach-btn" onclick="document.getElementById('file-input').click()">📎</button>

      <textarea id="chat-input" placeholder="Nhắn tin cho Design Check AI..." rows="1" oninput="autoGrow(this)"
        onkeydown="checkEnter(event)"></textarea>

      <button class="send-btn" onclick="sendMessage()">Gửi</button>
    </div>
  </div>

  <script>
    let sessionId = localStorage.getItem('chat_session');
    if (!sessionId) {
      sessionId = "sess_" + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('chat_session', sessionId);
    }

    let selectedFile = null;
    let currentErrorCount = 0;  // Số lỗi trong analysis card hiện tại

    function autoGrow(el) {
      el.style.height = "5px";
      el.style.height = (el.scrollHeight) + "px";
    }

    function previewFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      selectedFile = file;
      const url = URL.createObjectURL(file);
      document.getElementById("file-preview").src = url;
      document.getElementById("file-preview-wrap").style.display = "flex";
    }

    function clearFile() {
      selectedFile = null;
      document.getElementById("file-input").value = "";
      document.getElementById("file-preview-wrap").style.display = "none";
    }

    function checkEnter(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function createBubble(role, htmlContent) {
      const container = document.getElementById("chat-container");
      const div = document.createElement("div");
      div.className = `message ${role}`;
      const avatar = role === 'user' ? '👤' : '🔍';
      div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="content">${htmlContent}</div>
    `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div.querySelector('.content');
    }

    async function sendMessage() {
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text && !selectedFile) return;

      // 1. Vẽ User Bubble
      let userHtml = text;
      if (selectedFile) {
        const url = URL.createObjectURL(selectedFile);
        userHtml += `<br><img class="chat-attachment" src="${url}" />`;
      }
      createBubble("user", userHtml);

      // Chuẩn bị form
      const formData = new FormData();
      formData.append("session_id", sessionId);
      formData.append("message", text);
      if (selectedFile) {
        formData.append("file", selectedFile);
        // Dùng closure để giữ file vẽ canvas
        const closureFile = selectedFile;
        clearFile();
        input.value = "";
        autoGrow(input);

        const aiContent = createBubble("ai", '<div class="loading-pulse">Đang phân tích hình ảnh (có thể tốn 5-15s)...</div>');
        callBackend(formData, aiContent, closureFile);
      } else {
        input.value = "";
        autoGrow(input);
        const aiContent = createBubble("ai", '<div class="loading-pulse">Đang rà soát...</div>');
        callBackend(formData, aiContent, null);
      }
    }

    async function callBackend(formData, contentDiv, uploadedFile) {
      try {
        const res = await fetch("/chat", {
          method: "POST",
          body: formData
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        // Render dữ liệu trả về
        contentDiv.innerHTML = data.reply.replace(/\n/g, "<br>");

        // Nếu có Zoom Image
        if (data.type === "zoom" && data.image_data_url) {
          contentDiv.innerHTML += `<br><img class="chat-attachment" style="border-color:#ff4d6d;border-width:2px;border-style:dashed;" src="${data.image_data_url}" />`;
        }

        // Nếu có Analysis Data -> Vẽ DOM Canvas
        if (data.type === "analysis" && data.analysis_data && uploadedFile) {
          renderAnalysisCard(contentDiv, data.analysis_data, uploadedFile);
        }

      } catch (err) {
        contentDiv.innerHTML = `<span style="color:#e74c3c;">Lỗi hệ thống: ${err.message}</span>`;
      }
      document.getElementById("chat-container").scrollTop = document.getElementById("chat-container").scrollHeight;
    }

    function renderAnalysisCard(parentDiv, analysisData, file) {
      const errors = analysisData.e || [];
      currentErrorCount = errors.length;

      const card = document.createElement('div');
      card.className = "analysis-card";

      // Canvas
      const canvas = document.createElement("canvas");
      card.appendChild(canvas);

      // Error list
      const list = document.createElement('div');
      list.className = "error-list";
      if (errors.length === 0) {
        list.innerHTML = `<div style="color:var(--accent);padding:10px;">✅ Không phát hiện lỗi thiết kế nào!</div>`;
      } else {
        errors.forEach((err, i) => {
          list.innerHTML += `
          <div class="error-item">
            <input type="checkbox" class="error-check" id="err-check-${i}" data-index="${i}" />
            <span style="background:#555;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;">${i + 1}</span>
            <div class="reason">${err.r}</div>
            <span class="error-tag tag-${err.s}">${err.s}</span>
            <button class="zoom-btn" onclick="requestZoom(${i})">🔍 Zoom</button>
          </div>
        `;
        });

        // Fix Selected button
        const fixBtn = document.createElement('button');
        fixBtn.className = 'fix-selected-btn';
        fixBtn.id = 'fix-selected-btn';
        fixBtn.innerHTML = '🪄 Fix Selected';
        fixBtn.onclick = openRegenModal;
        list.appendChild(fixBtn);
      }
      card.appendChild(list);
      parentDiv.appendChild(card);

      // Vẽ box lên canvas
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.src = URL.createObjectURL(file);
      img.onload = () => {
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.drawImage(img, 0, 0);
        errors.forEach((err, i) => {
          const [x1, y1, x2, y2] = err.c || err.box_2d;
          ctx.strokeStyle = "#ff4d6d";
          ctx.lineWidth = Math.max(2, canvas.width / 400);
          ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

          // Vẽ số
          ctx.fillStyle = "#ff4d6d";
          ctx.beginPath();
          ctx.arc(x1 + 15, y1 + 15, 15, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#fff";
          ctx.font = "bold 16px Inter";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(i + 1, x1 + 15, y1 + 15);
        });
        // Scroll down sau khi vẽ xong
        document.getElementById("chat-container").scrollTop = document.getElementById("chat-container").scrollHeight;
      };
    }

    function requestZoom(errorIndex) {
      const aiContent = createBubble("ai", '<div class="loading-pulse">Đang cắt vùng ảnh...</div>');
      const formData = new FormData();
      formData.append("session_id", sessionId);
      formData.append("action_type", "zoom");
      formData.append("error_index", errorIndex);
      callBackend(formData, aiContent, null);
    }

    // --------------------------------------------------------
    // Fix & Regen Modal Logic
    // --------------------------------------------------------

    async function openRegenModal() {
      // Thu thập các checkbox đã chọn
      const checked = [];
      for (let i = 0; i < currentErrorCount; i++) {
        const cb = document.getElementById(`err-check-${i}`);
        if (cb && cb.checked) checked.push(i);
      }

      if (checked.length === 0) {
        alert('Vui lòng chọn ít nhất 1 lỗi để fix (tick vào ô checkbox).');
        return;
      }

      // Hiện modal
      const overlay = document.getElementById('regen-modal-overlay');
      overlay.classList.add('active');

      // Reset state
      document.getElementById('regen-mask-preview').style.display = 'none';
      document.getElementById('regen-prompt-input').value = 'Đang tải...';      
      document.getElementById('btn-start-regen').disabled = true;

      try {
        const fd = new FormData();
        fd.append('session_id', sessionId);
        fd.append('error_indices', JSON.stringify(checked));

        const res = await fetch('/prepare-regen', { method: 'POST', body: fd });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        // Hiện preview mask
        const maskImg = document.getElementById('regen-mask-preview');
        maskImg.src = data.mask_preview_b64;
        maskImg.style.display = 'block';

        // Điền prompt gợi ý
        document.getElementById('regen-prompt-input').value = data.suggested_prompt || '';
        document.getElementById('btn-start-regen').disabled = false;

        // Lưu indices vào dataset để dùng khi submit
        document.getElementById('btn-start-regen').dataset.indices = JSON.stringify(checked);

      } catch (err) {
        document.getElementById('regen-prompt-input').value = 'Lỗi tải dữ liệu: ' + err.message;
        document.getElementById('btn-start-regen').disabled = false;
      }
    }

    function closeRegenModal() {
      document.getElementById('regen-modal-overlay').classList.remove('active');
      document.getElementById('regen-loading').classList.remove('active');
      document.getElementById('btn-cancel-regen').disabled = false;
      document.getElementById('btn-start-regen').disabled = false;
    }

    async function startRegen() {
      const prompt = document.getElementById('regen-prompt-input').value.trim();
      const indicesStr = document.getElementById('btn-start-regen').dataset.indices || '[]';

      // Hiện loading
      document.getElementById('regen-loading').classList.add('active');
      document.getElementById('btn-start-regen').disabled = true;
      document.getElementById('btn-cancel-regen').disabled = true;

      try {
        const fd = new FormData();
        fd.append('session_id', sessionId);
        fd.append('error_indices', indicesStr);
        fd.append('final_prompt', prompt);

        const res = await fetch('/regen-image', { method: 'POST', body: fd });
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.detail || 'HTTP ' + res.status);
        }
        const data = await res.json();

        // Đóng modal
        closeRegenModal();

        // Hiển thị kết quả trong chat
        const numFixed = JSON.parse(indicesStr).length;
        const aiContent = createBubble('ai', data.reply || `✅ Đã sửa ${numFixed} vùng lỗi bằng Wan 2.6:`);

        // Ảnh kết quả
        const img = document.createElement('img');
        img.className = 'regen-result-img';
        img.src = data.image_data_url;
        img.alt = 'Ảnh thiết kế đã sửa';
        aiContent.appendChild(img);

        // Nút download
        const dlLink = document.createElement('a');
        dlLink.className = 'download-regen-btn';
        dlLink.href = data.image_data_url;
        dlLink.download = `design_fixed_wan26.png`;
        dlLink.innerHTML = '⬇️ Tải ảnh về';
        aiContent.appendChild(dlLink);

        // Nhỏ note prompt đã dùng
        if (data.prompt_used) {
          const note = document.createElement('div');
          note.style.cssText = 'font-size:0.75rem;color:#666;margin-top:8px;font-style:italic;';
          note.textContent = `Prompt: "${data.prompt_used.slice(0, 120)}${data.prompt_used.length > 120 ? '...' : ''}"`;
          aiContent.appendChild(note);
        }

        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;

      } catch (err) {
        closeRegenModal();
        createBubble('ai', `<span style="color:#e74c3c;">❌ Lỗi gen ảnh: ${err.message}</span>`);
      }
    }
  </script>
</body>

</html>
